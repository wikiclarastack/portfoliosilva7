<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Silva777only</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container { width: 100%; max-width: 400px; padding: 20px; }
        .login-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .login-header { text-align: center; margin-bottom: 40px; }
        .login-header h1 { color: #333; font-size: 2rem; margin-bottom: 10px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .form-group input {
            width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem;
        }
        .btn-login {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer;
        }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
        .message { margin-top: 20px; padding: 10px; border-radius: 10px; text-align: center; display: none; }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        .dashboard { display: none; width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .dashboard-header { background: white; border-radius: 20px; padding: 30px; margin-bottom: 30px; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: #667eea; }
        .admin-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .action-card { background: white; border-radius: 15px; padding: 25px; }
        .action-form input, .action-form textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; }
        .action-form button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .logout-btn { position: fixed; top: 20px; right: 20px; padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .ip-info { background: #f0f2f5; border-radius: 15px; padding: 15px; margin-bottom: 20px; font-size: 0.9rem; }
        .ip-info .ip { font-family: monospace; font-weight: bold; color: #e83e8c; }
    </style>
</head>
<body>

    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <div class="login-header">
                <h1>Painel Admin</h1>
                <p>Acesso exclusivo Silva777only</p>
            </div>
            
            <div class="ip-info">
                <p>Seu IP: <span class="ip" id="currentIp">carregando...</span></p>
                <p>Status: <span id="ipStatus">verificando...</span></p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Admin</label>
                    <input type="email" id="email" required placeholder="seu@email.com">
                </div>
                <button type="submit" class="btn-login" id="loginBtn" disabled>
                    Entrar com Link Mágico
                </button>
            </form>
            <div class="message" id="loginMessage"></div>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <button class="logout-btn" onclick="logout()">Sair</button>
        <div class="dashboard-header">
            <h1>Painel de Controle</h1>
            <p>Usuário: <span id="userEmail"></span></p>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>Visitas Hoje</h3><div class="stat-value" id="visitsToday">0</div></div>
            <div class="stat-card"><h3>Total de Contatos</h3><div class="stat-value" id="totalContacts">0</div></div>
            <div class="stat-card"><h3>Projetos Ativos</h3><div class="stat-value">3</div></div>
        </div>

        <div class="admin-actions">
            <div class="action-card">
                <h3>Enviar Notificação</h3>
                <form class="action-form" id="notificationForm">
                    <input type="text" placeholder="Título" required>
                    <textarea placeholder="Mensagem" rows="3" required></textarea>
                    <button type="submit">Enviar</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFarkcZ4W8lk-GybNyk4Fp4RMMl7cz6Gc",
            authDomain: "silvaportfolio-6766a.firebaseapp.com",
            databaseURL: "https://silvaportfolio-6766a-default-rtdb.firebaseio.com",
            projectId: "silvaportfolio-6766a",
            storageBucket: "silvaportfolio-6766a.firebasestorage.app",
            messagingSenderId: "166925374205",
            appId: "1:166925374205:web:973f9cbf9dced650b16494"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const ADMIN_IP = "177.64.72.8"; // O SEU IP DEFINIDO

        async function getCurrentIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('currentIp').textContent = data.ip;
                return data.ip;
            } catch (error) {
                return 'unknown';
            }
        }

        async function checkIPAccess() {
            const ip = await getCurrentIP();
            const statusEl = document.getElementById('ipStatus');
            const btn = document.getElementById('loginBtn');

            if (ip === ADMIN_IP) {
                statusEl.textContent = '✅ IP Autorizado';
                statusEl.style.color = 'green';
                btn.disabled = false;
                
                auth.onAuthStateChanged((user) => {
                    if (user) showDashboard(user);
                });
            } else {
                statusEl.textContent = '❌ Acesso Bloqueado';
                statusEl.style.color = 'red';
                btn.disabled = true;
                showMessage('Este IP não tem permissão de administrador.', 'error');
            }
        }

        function showMessage(text, type) {
            const msg = document.getElementById('loginMessage');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const actionCodeSettings = {
                url: window.location.href,
                handleCodeInApp: true
            };
            try {
                await auth.sendSignInLinkToEmail(email, actionCodeSettings);
                window.localStorage.setItem('emailForSignIn', email);
                showMessage('Link enviado! Verifique seu email.', 'success');
            } catch (error) {
                showMessage('Erro ao enviar link.', 'error');
            }
        });

        function handleEmailLinkSignIn() {
            if (auth.isSignInWithEmailLink(window.location.href)) {
                let email = window.localStorage.getItem('emailForSignIn') || window.prompt('Confirme seu email:');
                if (email) {
                    auth.signInWithEmailLink(email, window.location.href)
                        .then((result) => {
                            window.localStorage.removeItem('emailForSignIn');
                            showDashboard(result.user);
                        });
                }
            }
        }

        function showDashboard(user) {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('userEmail').textContent = user.email;
        }

        function logout() {
            auth.signOut().then(() => location.reload());
        }

        // Iniciar verificação
        checkIPAccess();
        handleEmailLinkSignIn();

    </script>
</body>
</html>
